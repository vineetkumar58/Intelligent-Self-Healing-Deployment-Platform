@"
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install and test backend
      run: |
        pip install -r app/requirements.txt pytest
        cd app
        python -c "from app import app; print('Import OK')"

    - name: Lint Dockerfile
      run: docker build --no-cache -t test-build ./app

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: `${{ secrets.DOCKERHUB_USERNAME }}
        password: `${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: true
        tags: |
          `${{ secrets.DOCKERHUB_USERNAME }}/self-healing-backend:latest
          `${{ secrets.DOCKERHUB_USERNAME }}/self-healing-backend:`${{ github.sha }}

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          `${{ secrets.DOCKERHUB_USERNAME }}/self-healing-frontend:latest
          `${{ secrets.DOCKERHUB_USERNAME }}/self-healing-frontend:`${{ github.sha }}

    - name: Update deployment manifests
      run: |
        sed -i "s|YOUR_DOCKERHUB_USERNAME|`${{ secrets.DOCKERHUB_USERNAME }}|g" k8s/deployment-backend.yaml
        sed -i "s|YOUR_DOCKERHUB_USERNAME|`${{ secrets.DOCKERHUB_USERNAME }}|g" k8s/deployment-frontend.yaml

    - name: Archive manifests as artifact
      uses: actions/upload-artifact@v4
      with:
        name: k8s-manifests-`${{ github.sha }}
        path: k8s/

    - name: Notify Slack on success
      if: success()
      run: |
        curl -s -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Content-type: application/json" \
          -d "{\"text\":\"Build SUCCESS: self-healing-platform by `${{ github.actor }} - commit `${{ github.sha }}\"}" \
          `${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Notify Slack on failure
      if: failure()
      run: |
        curl -s -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Content-type: application/json" \
          -d "{\"text\":\"Build FAILED: self-healing-platform by `${{ github.actor }} - commit `${{ github.sha }}\"}" \
          `${{ secrets.SLACK_WEBHOOK_URL }}
"@ | Out-File -FilePath .github\workflows\deploy.yml -Encoding utf8