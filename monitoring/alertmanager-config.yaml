apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-monitoring-kube-prometheus-alertmanager
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "self-healing-platform@gmail.com"
      smtp_auth_username: "self-healing-platform@gmail.com"
      smtp_auth_password: "REPLACE_WITH_APP_PASSWORD"
      smtp_require_tls: true

    route:
      group_by: ["alertname", "namespace"]
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 30m
      receiver: "slack-alerts"
      routes:
      - match:
          severity: critical
        receiver: "slack-and-email"

    receivers:
    - name: "slack-alerts"
      slack_configs:
      - api_url: "REPLACE_WITH_YOUR_SLACK_WEBHOOK"
        channel: "#k8s-alerts"
        title: "Alert: {{ .GroupLabels.alertname }}"
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Namespace:* {{ .CommonLabels.namespace }}
          {{ range .Alerts }}*Description:* {{ .Annotations.description }}{{ end }}
        send_resolved: true

    - name: "slack-and-email"
      slack_configs:
      - api_url: "REPLACE_WITH_YOUR_SLACK_WEBHOOK"
        channel: "#k8s-alerts"
        title: "CRITICAL Alert: {{ .GroupLabels.alertname }}"
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Namespace:* {{ .CommonLabels.namespace }}
          {{ range .Alerts }}*Description:* {{ .Annotations.description }}{{ end }}
        send_resolved: true
      email_configs:
      - to: "team@self-healing-platform.com"
        send_resolved: true

    inhibit_rules:
    - source_match:
        severity: "critical"
      target_match:
        severity: "warning"
      equal: ["alertname", "namespace"]


