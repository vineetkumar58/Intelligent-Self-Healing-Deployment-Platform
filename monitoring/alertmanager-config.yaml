apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-monitoring-kube-prometheus-alertmanager
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 30m
      receiver: 'slack-alerts'
      routes:
      - match:
          severity: critical
        receiver: 'slack-alerts'
    receivers:
    - name: 'slack-alerts'
      slack_configs:
      - api_url: 'https://hooks.slack.com/services/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'
        channel: '#k8s-alerts'
        title: 'Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Namespace:* {{ .CommonLabels.namespace }}
          {{ range .Alerts }}*Description:* {{ .Annotations.description }}{{ end }}
        send_resolved: true
