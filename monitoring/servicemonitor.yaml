apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: self-healing-backend
  namespaceSelector:
    matchNames:
    - self-healing-app
  endpoints:
  - port: http
    path: /metrics
    interval: 15s